# --- General Settings ---
set -g default-terminal "tmux-256color"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g status-interval 5

# Use Vim keybindings in copy mode
setw -g mode-keys vi

# --- Keybindings ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# New window in same directory
bind c new-window -c "#{pane_current_path}"

# Better split shortcuts
bind + split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Easy config reload
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# --- Copy Mode & Mouse Fixes ---
# Stay in copy mode and don't jump to bottom when mouse drag ends
unbind -T copy-mode-vi MouseDragEnd1Pane

# Use 'v' to begin selection and 'y' to yank (like Vim)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# --- Plugins (TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'        # Recommended: Bridges tmux to macOS clipboard
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

# --- Catppuccin Theme Configuration ---
set -g @plugin 'catppuccin/tmux#v2.1.2'
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "slanted"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_window_text "#W"

# Restore Ctrl-l to clear screen
bind C-l send-keys 'C-l'

# --- Status Bar Layout ---
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
