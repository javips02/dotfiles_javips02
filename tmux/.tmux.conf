# --- General Settings ---
set -g default-terminal "screen-256color"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g status-interval 15  # Refresh every 15 seconds

# --- Keybindings ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Smart pane switching (vim-tmux-navigator)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Split shortcuts
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-battery'      

# --- Gruvbox Theme Configuration ---
set -g @plugin 'egel/tmux-gruvbox'
set -g @tmux-gruvbox 'dark256'

# Custom Status Segments
set -g @tmux-gruvbox-left-status-a '#S'

# NOTE: Use single quotes to prevent early shell expansion
set -g @tmux-gruvbox-right-status-x 'Batt: #{battery_percentage}'
set -g @tmux-gruvbox-right-status-y '%d-%m-%Y'
set -g @tmux-gruvbox-right-status-z '%H:%M'

# --- Initialize TPM (Keep at the bottom) ---
run '~/.tmux/plugins/tpm/tpm'